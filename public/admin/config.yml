# ==========================================================================
# GM Group — Sveltia / Decap CMS configuration
# This file defines what the client can edit through gmltzs.com/admin
# ==========================================================================

backend:
  name: github
  repo: Ismail-K4747/gmltzs-website
  branch: main
  base_url: https://gmltzs-cms-auth.generalmalick.workers.dev
  auth_endpoint: /auth

# Where uploaded photos go
media_folder: "public/uploads"
public_folder: "/uploads"

# Show published changes immediately (no editorial workflow / drafts)
publish_mode: simple
site_url: https://gmltzs.com
display_url: https://gmltzs.com
logo_url: /images/GML%20LOGO%20transparent%20background%20png.png

# ==========================================================================
# COLLECTIONS — what the client sees in the sidebar
# ==========================================================================
collections:

  # -------- 1. PAGES --------
  - name: pages
    label: "Pages"
    label_singular: "Page"
    folder: "src/content/pages"
    extension: "md"
    format: "frontmatter"
    create: false   # client edits existing pages; doesn't create new ones (yet)
    delete: false
    slug: "{{slug}}"
    summary: "{{title}}"
    fields:
      # ---- SEO ----
      - { name: title,            label: "Browser tab title",            widget: string }
      - { name: metaDescription,  label: "Search engine description",    widget: text }
      - { name: metaKeywords,     label: "Keywords (optional)",          widget: string, required: false }
      - { name: canonical,        label: "Canonical URL",                widget: string, required: false }
      - { name: ogTitle,          label: "Social share title",           widget: string, required: false }
      - { name: ogDescription,    label: "Social share description",     widget: text,   required: false }

      # ---- HERO ----
      - { name: heroEyebrow,      label: "Hero — small label above title", widget: string, required: false }
      - { name: heroTitle,        label: "Hero — main title",            widget: string, required: false }
      - { name: heroTitleAccent,  label: "Hero — accent word",           widget: string, required: false }
      - { name: heroSubtitle,     label: "Hero — subtitle",              widget: text,   required: false }
      - name: heroActions
        label: "Hero — buttons"
        widget: list
        required: false
        fields:
          - { name: label, label: "Button text",  widget: string }
          - { name: href,  label: "Link",         widget: string }
          - { name: style, label: "Style",        widget: select, options: ["primary", "ghost", "outline"], default: "primary" }
      - name: heroStats
        label: "Hero — stat cards"
        widget: list
        required: false
        fields:
          - { name: number, label: "Number / label", widget: string }
          - { name: label,  label: "Caption",        widget: string }

      # ---- ABOUT ----
      - { name: aboutEyebrow,     label: "About — eyebrow",              widget: string, required: false }
      - { name: aboutTitle,       label: "About — title",                widget: string, required: false }
      - { name: aboutLead,        label: "About — lead paragraph",       widget: text,   required: false }
      - name: aboutParagraphs
        label: "About — body paragraphs"
        widget: list
        required: false
        field: { name: paragraph, label: "Paragraph", widget: text }
      - { name: aboutCtaLabel,    label: "About — button text",          widget: string, required: false }
      - { name: aboutCtaHref,     label: "About — button link",          widget: string, required: false }
      - name: aboutCards
        label: "About — feature cards"
        widget: list
        required: false
        fields:
          - { name: title,       label: "Title",       widget: string }
          - { name: description, label: "Description", widget: text }

      # ---- BUSINESSES (homepage only) ----
      - { name: businessesEyebrow,  label: "Businesses — eyebrow",  widget: string, required: false }
      - { name: businessesTitle,    label: "Businesses — title",    widget: string, required: false }
      - { name: businessesSubtitle, label: "Businesses — subtitle", widget: text,   required: false }
      - name: businesses
        label: "Businesses — cards"
        widget: list
        required: false
        fields:
          - { name: id,          label: "ID (anchor)",       widget: string }
          - { name: tag,         label: "Corner tag",        widget: string }
          - { name: tagStyle,    label: "Tag style",         widget: select, options: ["default", "soon"], default: "default" }
          - { name: imageClass,  label: "Background class",  widget: string }
          - { name: logo,        label: "Logo image",        widget: image, required: false }
          - { name: logoAlt,     label: "Logo alt text",     widget: string, required: false }
          - { name: title,       label: "Card title",        widget: string }
          - { name: description, label: "Description",       widget: text }
          - name: features
            label: "Features"
            widget: list
            field: { name: feature, label: "Feature", widget: string }
          - { name: link,             label: "Learn-more link",     widget: string, required: false }
          - { name: comingSoon,       label: "Coming soon?",        widget: boolean, default: false }
          - { name: comingSoonLabel,  label: "Coming-soon badge",   widget: string, required: false }

      # ---- VALUES ----
      - { name: valuesEyebrow, label: "Values — eyebrow", widget: string, required: false }
      - { name: valuesTitle,   label: "Values — title",   widget: string, required: false }
      - name: values
        label: "Values — items"
        widget: list
        required: false
        fields:
          - { name: title,       label: "Value name",  widget: string }
          - { name: description, label: "Description", widget: text }

      # ---- TESTIMONIALS ----
      - { name: testimonialsEyebrow, label: "Testimonials — eyebrow", widget: string, required: false }
      - { name: testimonialsTitle,   label: "Testimonials — title",   widget: string, required: false }
      - name: testimonials
        label: "Testimonials"
        widget: list
        required: false
        fields:
          - { name: quote,    label: "Quote",         widget: text }
          - { name: initials, label: "Avatar letters", widget: string }
          - { name: name,     label: "Person's name",  widget: string }
          - { name: role,     label: "Role / company", widget: string }

      # ---- CONTACT ----
      - { name: contactEyebrow,  label: "Contact — eyebrow",  widget: string, required: false }
      - { name: contactTitle,    label: "Contact — title",    widget: string, required: false }
      - { name: contactSubtitle, label: "Contact — subtitle", widget: text,   required: false }

      # ---- BODY SECTIONS (for inner pages) ----
      - name: bodySections
        label: "Page sections"
        widget: list
        required: false
        fields:
          - { name: eyebrow, label: "Eyebrow", widget: string, required: false }
          - { name: title,   label: "Title",   widget: string, required: false }
          - { name: body,    label: "Body",    widget: markdown, required: false }
          - { name: image,   label: "Image",   widget: image, required: false }

      # ==========================================================================
      # INNER PAGE FIELDS (Medical Devices, Pharmacy, Lab, Real Estate, etc.)
      # ==========================================================================

      # ---- INNER PAGE THEME ----
      - { name: pageTheme,         label: "Inner page — theme",       widget: select, options: ["", "devices", "medics", "laboratory", "realestate"], required: false }
      - { name: pageHeroBgClass,   label: "Inner page — hero background CSS class", widget: string, required: false }
      - { name: pageHeroTag,       label: "Inner page — hero small tag",  widget: string, required: false }
      - { name: pageHeroTitle,     label: "Inner page — hero title",      widget: string, required: false }
      - { name: pageHeroDescription, label: "Inner page — hero description", widget: text, required: false }

      # ---- INNER PAGE ABOUT ----
      - { name: pageAboutEyebrow,  label: "Inner about — eyebrow",     widget: string, required: false }
      - { name: pageAboutTitle,    label: "Inner about — title",       widget: string, required: false }
      - name: pageAboutParagraphs
        label: "Inner about — paragraphs"
        widget: list
        required: false
        field: { name: paragraph, label: "Paragraph", widget: text }

      # ---- SERVICES (business pages) ----
      - name: services
        label: "Services / cards"
        label_singular: "Service"
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: title,       label: "Title",       widget: string }
          - { name: description, label: "Description", widget: text }
          - { name: iconSvg,     label: "Inline SVG (paths only)", widget: text, required: false, hint: "Advanced — paste raw <path>/<circle>/etc. inside the existing 24×24 viewbox" }

      # ---- CTA BANNER ----
      - name: ctaBanner
        label: "Call-to-action banner"
        widget: object
        required: false
        fields:
          - { name: title,       label: "Title",       widget: string }
          - { name: description, label: "Description", widget: text }
          - { name: buttonLabel, label: "Button label", widget: string, default: "Get in Touch" }
          - { name: buttonHref,  label: "Button link",  widget: string, default: "/#contact" }

      - { name: whatsappMessage, label: "WhatsApp pre-filled message", widget: text, required: false }

      # ---- INSIGHTS ARTICLES ----
      - name: insightsArticles
        label: "Insights — articles"
        label_singular: "Article"
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: tag,       label: "Tag (e.g. Healthcare)", widget: string }
          - { name: title,     label: "Title",                 widget: string }
          - { name: excerpt,   label: "Excerpt",               widget: text }
          - { name: author,    label: "Author",                widget: string }
          - { name: dateLabel, label: "Date label (e.g. March 2026)", widget: string }
          - { name: datetime,  label: "Datetime ISO (e.g. 2026-03)",  widget: string, required: false }

      # ---- LEGAL PAGES ----
      - { name: legalLastUpdated, label: "Legal — last updated", widget: string, required: false }
      - name: legalSections
        label: "Legal — sections"
        widget: list
        required: false
        summary: "{{fields.title}}"
        fields:
          - { name: title, label: "Section title", widget: string }
          - { name: body,  label: "Section body (HTML allowed)", widget: text }

      # ==========================================================================
      # REAL-ESTATE-SPECIFIC FIELDS
      # ==========================================================================
      - { name: projectEyebrow,  label: "Project — eyebrow",  widget: string, required: false }
      - { name: projectTitle,    label: "Project — title",    widget: string, required: false }
      - { name: projectSubtitle, label: "Project — subtitle", widget: text,   required: false }
      - name: projectStats
        label: "Project — quick stats"
        widget: list
        required: false
        fields:
          - { name: value, label: "Value", widget: string }
          - { name: label, label: "Label", widget: string }
      - name: projectGalleryAllImages
        label: "Project — gallery (lightbox set)"
        widget: list
        required: false
        field: { name: image, label: "Image", widget: image }
      - name: projectGalleryMain
        label: "Project — main gallery image"
        widget: object
        required: false
        fields:
          - { name: image, label: "Image", widget: image }
          - { name: alt,   label: "Alt text", widget: string, required: false }
      - name: projectGalleryThumbs
        label: "Project — gallery side thumbnails (4 max)"
        widget: list
        required: false
        fields:
          - { name: image,        label: "Image", widget: image }
          - { name: alt,          label: "Alt text", widget: string, required: false }
          - { name: countOverlay, label: "Overlay text (e.g. +15 Photos) — leave blank for normal thumbs", widget: string, required: false }
      - name: videoTourSlides
        label: "Project — video tour slides"
        widget: list
        required: false
        fields:
          - { name: videoUrl,  label: "Video file (MP4)", widget: file }
          - { name: posterUrl, label: "Poster image",     widget: image, required: false }
      - name: progressCards
        label: "Project — construction progress timeline"
        label_singular: "Progress update"
        widget: list
        required: false
        summary: "{{fields.dateLabel}} — {{fields.title}}"
        fields:
          - { name: index,            label: "Order index (0,1,2,...)", widget: number, value_type: int }
          - { name: markerLabel,      label: "Timeline marker (e.g. Feb 2026)", widget: string }
          - { name: markerAriaLabel,  label: "Marker aria-label", widget: string, required: false }
          - { name: mediaType,        label: "Media type", widget: select, options: ["image", "video"], default: "image" }
          - { name: mediaUrl,         label: "Media file (image or video)", widget: file }
          - { name: posterUrl,        label: "Video poster image (optional)", widget: image, required: false }
          - { name: overlayLabel,     label: "Overlay small label (e.g. Autoplay on View)", widget: string, required: false }
          - { name: overlayHeadline,  label: "Overlay headline", widget: string, required: false }
          - { name: dateLabel,        label: "Date label", widget: string }
          - { name: title,            label: "Headline", widget: string }
          - { name: caption,          label: "Caption", widget: text }
          - { name: active,           label: "Active by default?", widget: boolean, default: false }
      - name: projectFeatures
        label: "Project — feature cards"
        widget: list
        required: false
        fields:
          - { name: title,       label: "Title",       widget: string }
          - { name: description, label: "Description", widget: text }
          - { name: iconSvg,     label: "Inline SVG (paths only)", widget: text, required: false }
      - { name: projectEnquireButtonLabel, label: "Project enquire-button label", widget: string, required: false }

      # ---- PHOTO GALLERY  ★ THIS IS WHERE THE CLIENT ADDS PHOTOS ★ ----
      - { name: galleryTitle, label: "Photo gallery — section title", widget: string, required: false }
      - name: galleryPhotos
        label: "Photo gallery — photos"
        label_singular: "Photo"
        widget: list
        required: false
        summary: "{{fields.caption}}"
        fields:
          - { name: image,   label: "Photo",        widget: image }
          - { name: caption, label: "Caption",      widget: string, required: false }
          - { name: alt,     label: "Alt text (accessibility)", widget: string, required: false }

  # -------- 2. SITE SETTINGS --------
  - name: settings
    label: "Site Settings"
    files:
      - name: site
        label: "General Settings"
        file: "src/content/settings/site.yml"
        format: "yml"
        fields:
          - { name: siteName,     label: "Site name",     widget: string }
          - { name: siteTagline,  label: "Tagline",       widget: string, required: false }
          - { name: contactEmail, label: "Contact email", widget: string }
          - { name: contactPhone, label: "Contact phone", widget: string, required: false }
          - { name: contactFax,   label: "Fax",           widget: string, required: false }
          - { name: address,      label: "Address",       widget: text,   required: false }
          - { name: headOfficeMapEmbed, label: "Google Maps embed URL", widget: string, required: false }
          - name: socials
            label: "Social links"
            widget: list
            required: false
            fields:
              - { name: platform, label: "Platform", widget: string }
              - { name: url,      label: "URL",      widget: string }
          - { name: footerTagline, label: "Footer tagline", widget: text, required: false }
          - { name: footerLegal,   label: "Footer legal text", widget: string, required: false }
